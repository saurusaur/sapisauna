<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home UserCard Wireframe v5 — Sauna Log</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #cc1a1a;
    --color-saunner: #F97316;
    --color-bather: #3B82F6;
    --color-jimi: #22C55E;
    --glass-bg: hsla(0,0%,100%,0.55);
    --glass-border: hsla(0,0%,100%,0.65);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; padding:40px 20px; gap:40px; }
  h1 { font-family:'Oswald',sans-serif; color:#fff; font-size:24px; text-align:center; }
  .subtitle { color:#999; font-size:13px; text-align:center; margin-top:-20px; max-width:500px; line-height:1.5; }
  .row { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; align-items:flex-start; }
  .label { font-family:'Oswald',sans-serif; color:#aaa; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; text-align:center; margin-bottom:6px; }
  .card-wrap { width:343px; display:flex; flex-direction:column; align-items:center; }
  .glass-card {
    width:100%; border-radius:12px; padding:16px;
    background:var(--glass-bg); backdrop-filter:blur(12px);
    border:0.5px solid var(--glass-border);
    box-shadow:0 3px 12px -3px hsla(0,10%,15%,0.1);
  }

  /* Row 1: 아바타 + 닉/칭호 + 레벨 */
  .nc .row1 { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .nc .avatar { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .nc .name-area { flex:1; display:flex; align-items:center; gap:6px; min-width:0; }
  .nc .nick { font-size:14px; font-weight:700; color:#57534e; white-space:nowrap; }
  .nc .title-badge { font-size:11px; color:#b45309; opacity:0.7; background:#fef3c7; padding:2px 8px; border-radius:99px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nc .level-row { display:flex; align-items:center; gap:5px; flex-shrink:0; }
  .nc .level-bar { width:24px; height:3px; border-radius:99px; background:#e7e5e4; overflow:hidden; }
  .nc .level-fill { height:100%; border-radius:99px; background:var(--color-primary); }
  .nc .level-num { font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; color:#78716c; }

  /* Row 2: 두 줄 — 값 줄(52px) + 라벨 줄 */
  .nc .row2 { display:flex; flex-direction:column; gap:4px; }

  /* 값 줄: 3칸 균등 그리드 */
  .nc .values-row { display:grid; grid-template-columns:1fr 1fr 1fr; height:52px; }
  .nc .val-cell { display:flex; align-items:center; justify-content:center; }
  .nc .ring-wrap { width:52px; height:52px; position:relative; display:flex; align-items:center; justify-content:center; }
  .nc .ring-wrap svg { position:absolute; inset:0; width:100%; height:100%; }
  .nc .ring-val { font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; color:#57534e; z-index:1; }
  .nc .stat-val { font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; color:#57534e; line-height:1; }

  /* 라벨 줄: 동일 3칸 균등 그리드 */
  .nc .labels-row { display:grid; grid-template-columns:1fr 1fr 1fr; }
  .nc .label-cell { display:flex; justify-content:center; }
  .nc .bottom-label { font-size:9px; color:#a8a29e; font-weight:500; letter-spacing:0.3px; }
</style>
</head>
<body>

<h1>HOME USER CARD v5</h1>
<p class="subtitle">레벨=앱 primary 통일 | 링=전체 기록 합산 + primary red | 숫자 중앙정렬</p>

<div class="row">
  <!-- Saunner primary -->
  <div class="card-wrap">
    <span class="label">Primary: Saunner</span>
    <div class="glass-card nc">
      <div class="row1">
        <div class="avatar" style="background:rgba(249,115,22,0.15);">🔥</div>
        <div class="name-area">
          <span class="nick">사우나좋아</span>
          <span class="title-badge">초보 사우너</span>
        </div>
        <div class="level-row">
          <div class="level-bar"><div class="level-fill" style="width:65%;"></div></div>
          <span class="level-num">Lv.5</span>
        </div>
      </div>
      <div class="row2">
        <div class="values-row">
          <div class="val-cell">
            <div class="ring-wrap">
              <svg viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="21" fill="none" stroke="#f0e0d0" stroke-width="4.5"/>
                <circle cx="26" cy="26" r="21" fill="none" stroke="var(--color-primary)" stroke-width="4.5"
                  stroke-dasharray="132" stroke-dashoffset="40"
                  stroke-linecap="round" transform="rotate(-90 26 26)"/>
              </svg>
              <span class="ring-val">42</span>
            </div>
          </div>
          <div class="val-cell"><span class="stat-val">48</span></div>
          <div class="val-cell"><span class="stat-val">12</span></div>
        </div>
        <div class="labels-row">
          <div class="label-cell"><span class="bottom-label">이번 주 열기</span></div>
          <div class="label-cell"><span class="bottom-label">총 기록</span></div>
          <div class="label-cell"><span class="bottom-label">방문 장소</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bather primary -->
  <div class="card-wrap">
    <span class="label">Primary: Bather</span>
    <div class="glass-card nc">
      <div class="row1">
        <div class="avatar" style="background:rgba(59,130,246,0.15);">🛁</div>
        <div class="name-area">
          <span class="nick">목욕왕</span>
          <span class="title-badge">물의 달인</span>
        </div>
        <div class="level-row">
          <div class="level-bar"><div class="level-fill" style="width:40%;"></div></div>
          <span class="level-num">Lv.8</span>
        </div>
      </div>
      <div class="row2">
        <div class="values-row">
          <div class="val-cell">
            <div class="ring-wrap">
              <svg viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="21" fill="none" stroke="#f0e0d0" stroke-width="4.5"/>
                <circle cx="26" cy="26" r="21" fill="none" stroke="var(--color-primary)" stroke-width="4.5"
                  stroke-dasharray="132" stroke-dashoffset="0"
                  stroke-linecap="round" transform="rotate(-90 26 26)"/>
              </svg>
              <span class="ring-val" style="font-size:15px;">60+</span>
            </div>
          </div>
          <div class="val-cell"><span class="stat-val">128</span></div>
            <div class="val-cell"><span class="stat-val">24</span></div>
          </div>
        </div>
        <div class="labels-row">
          <div class="label-cell"><span class="bottom-label">이번 주 열기</span></div>
          <div class="label-cell"><span class="bottom-label">총 기록</span></div>
          <div class="label-cell"><span class="bottom-label">방문 장소</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Jimi primary -->
  <div class="card-wrap">
    <span class="label">Primary: Jimi</span>
    <div class="glass-card nc">
      <div class="row1">
        <div class="avatar" style="background:rgba(34,197,94,0.15);">🥚</div>
        <div class="name-area">
          <span class="nick">찜질왕</span>
          <span class="title-badge">한증막 마스터</span>
        </div>
        <div class="level-row">
          <div class="level-bar"><div class="level-fill" style="width:80%;"></div></div>
          <span class="level-num">Lv.12</span>
        </div>
      </div>
      <div class="row2">
        <div class="values-row">
          <div class="val-cell">
            <div class="ring-wrap">
              <svg viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="21" fill="none" stroke="#f0e0d0" stroke-width="4.5"/>
                <circle cx="26" cy="26" r="21" fill="none" stroke="var(--color-primary)" stroke-width="4.5"
                  stroke-dasharray="132" stroke-dashoffset="100"
                  stroke-linecap="round" transform="rotate(-90 26 26)"/>
              </svg>
              <span class="ring-val">18</span>
            </div>
          </div>
          <div class="val-cell"><span class="stat-val">36</span></div>
            <div class="val-cell"><span class="stat-val">8</span></div>
          </div>
        </div>
        <div class="labels-row">
          <div class="label-cell"><span class="bottom-label">이번 주 열기</span></div>
          <div class="label-cell"><span class="bottom-label">총 기록</span></div>
          <div class="label-cell"><span class="bottom-label">방문 장소</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
