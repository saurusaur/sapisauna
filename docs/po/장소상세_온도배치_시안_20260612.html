<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장소 상세 — 신규 시설 온도 배치 시안 (2026-06-12)</title>
<style>
  /* 앱 토큰 미러 (globals.css) */
  :root {
    --color-primary: #cc1a1a;
    --color-bather: #3B82F6;
    --color-saunner: #F97316;
    --color-jimi: #22C55E;
    --stone-200: #e7e5e4; --stone-300: #d6d3d1; --stone-400: #a8a29e;
    --stone-500: #78716c; --stone-600: #57534e; --stone-700: #44403c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif; background:#efeae4; padding:24px 12px 80px; }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size:18px; color:var(--stone-700); margin-bottom:6px; }
  .sub { font-size:12px; color:var(--stone-500); line-height:1.6; margin-bottom:20px; }
  .sub b { color:var(--color-primary); }

  /* 컨트롤 */
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .controls .grp { display:flex; gap:6px; align-items:center; background:#fff; border:1px solid var(--stone-200); border-radius:12px; padding:6px 8px; }
  .controls .grp-label { font-size:11px; font-weight:700; color:var(--stone-400); padding:0 4px; }
  .controls button { border:1px solid var(--stone-300); background:#fff; color:var(--stone-600); font-size:12px; padding:6px 10px; border-radius:8px; cursor:pointer; }
  .controls button.on { background:var(--color-primary); border-color:var(--color-primary); color:#fff; font-weight:700; }

  .note { font-size:11.5px; color:var(--stone-500); background:#fff; border:1px dashed var(--stone-300); border-radius:10px; padding:10px 12px; margin-bottom:20px; line-height:1.65; }

  /* 폰 프레임 + 카드 (실제 explore 통계 카드 미러) */
  .phones { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .phone { width:393px; background:#f5f1ec; border:1px solid var(--stone-300); border-radius:24px; padding:16px; }
  .phone h3 { font-size:12px; font-weight:800; color:var(--stone-500); letter-spacing:.04em; margin-bottom:10px; }
  .glass { background:rgba(255,255,255,.66); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.8); border-radius:16px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }

  .sect-temp { padding:12px 0; display:grid; gap:0 24px; }
  .tm { display:flex; flex-direction:column; }
  .tm .lbl { font-size:12px; font-weight:600; color:var(--stone-500); margin-bottom:4px; white-space:nowrap; }
  .tm .val { font-size:20px; font-weight:700; color:var(--stone-700); line-height:1; }
  .tm .val small { font-size:10px; font-weight:400; color:var(--stone-400); margin-left:2px; }
  .tm.new .lbl::after { content:'N'; font-size:8px; font-weight:800; color:#fff; background:var(--color-primary); border-radius:4px; padding:1px 3px; margin-left:4px; vertical-align:2px; }

  .sect-tribe { padding-top:12px; border-top:1px solid var(--stone-200); display:grid; gap:0 24px; }
  .tribe-col .t-name { font-size:12px; font-weight:500; margin-bottom:8px; }
  .tribe-col .row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
  .tribe-col .row .k { color:var(--stone-500); white-space:nowrap; }
  .tribe-col .row .v { font-weight:700; color:var(--stone-700); }
  .tribe-col .row.new .k::after { content:'N'; font-size:8px; font-weight:800; color:#fff; background:var(--color-primary); border-radius:4px; padding:1px 3px; margin-left:4px; vertical-align:1px; }

  .empty-hint { font-size:11px; color:var(--stone-400); font-style:italic; padding:8px 0; }
  .cap { font-size:11px; color:var(--stone-500); line-height:1.6; margin-top:10px; padding:0 4px; }
  .cap b { color:var(--stone-700); }
</style>
</head>
<body>
<div class="wrap">
  <h1>장소 상세 — 신규 시설 온도 배치 시안</h1>
  <p class="sub">
    2026-06-12 · D-9 시뮬레이션 · 029 신규 온도 캐시(<b>소금사우나·노천탕·아이스방</b>)를 장소 상세 통계 카드 어디에 노출할지 비교.<br>
    열탕(목욕파)·급냉탕(사우너)은 <b>현행대로 트라이브 서브 메트릭</b>에 유지. 모든 항목은 <b>온도 데이터가 1건이라도 있어야 노출</b> — 없으면 항목 자체가 안 뜸 (아래 시나리오 토글로 확인).
  </p>

  <div class="controls">
    <div class="grp"><span class="grp-label">배치안</span>
      <button data-layout="A" class="on">A안 · 객관 온도 그리드 합류</button>
      <button data-layout="B">B안 · 트라이브 서브 메트릭</button>
    </div>
    <div class="grp"><span class="grp-label">데이터 시나리오</span>
      <button data-scn="full" class="on">① 시설 풀옵션</button>
      <button data-scn="bath">② 동네 목욕탕</button>
      <button data-scn="jjim">③ 찜질방 전문</button>
    </div>
  </div>

  <div class="note" id="layoutNote"></div>

  <div class="phones">
    <div class="phone">
      <h3 id="phoneTitle"></h3>
      <div class="glass">
        <div class="sect-temp" id="tempGrid"></div>
        <div class="sect-tribe" id="tribeGrid"></div>
      </div>
      <p class="cap" id="phoneCap"></p>
    </div>
  </div>
</div>

<script>
// ── 데이터 시나리오 (null = 기록 없음 → 항목 미노출) ──────────────
const SCENARIOS = {
  full: {
    name: '① 시설 풀옵션 (스파랜드급)',
    temps: { hot:40, dry:92, cold:17, bulgama:88, salt:55, openair:39, iceroom:4 },
    tribe: {
      saunner: { steam:65, ice:8, totono:4.2, revisit:4.5 },
      bather:  { veryhot:43, water:4.0, revisit:4.1 },
      jimi:    { sweat:4.3, rest:4.0, revisit:4.4 },
    },
  },
  bath: {
    name: '② 동네 목욕탕 (온탕·냉탕·건식만)',
    temps: { hot:41, dry:85, cold:18, bulgama:null, salt:null, openair:null, iceroom:null },
    tribe: {
      saunner: { steam:null, ice:null, totono:3.8, revisit:3.9 },
      bather:  { veryhot:44, water:4.3, revisit:4.6 },
      jimi:    null,
    },
  },
  jjim: {
    name: '③ 찜질방 전문 (탕 없음, 때면 위주)',
    temps: { hot:null, dry:78, cold:null, bulgama:95, salt:52, openair:null, iceroom:6 },
    tribe: {
      saunner: { steam:null, ice:null, totono:3.5, revisit:3.6 },
      bather:  null,
      jimi:    { sweat:4.6, rest:4.5, revisit:4.7 },
    },
  },
}

const TRIBE_META = {
  saunner: { name:'🔥 SAUNNER', color:'var(--color-saunner)' },
  bather:  { name:'🛁 BATHER',  color:'var(--color-bather)' },
  jimi:    { name:'🥚 JIMI',    color:'var(--color-jimi)' },
}

let layout = 'A', scn = 'full'

function tempItem(label, v, isNew) {
  if (v == null) return ''   // ★ 온도 없으면 항목 자체 미노출
  return `<div class="tm${isNew?' new':''}"><span class="lbl">${label}</span><span class="val">${v}<small>°C</small></span></div>`
}
function row(label, v, suffix, isNew) {
  if (v == null) return ''
  return `<div class="row${isNew?' new':''}"><span class="k">${label}</span><span class="v">${v}${suffix}</span></div>`
}

function render() {
  const d = SCENARIOS[scn]
  document.getElementById('phoneTitle').textContent = d.name + ' — ' + (layout==='A' ? 'A안' : 'B안')

  // ── 객관 온도 그리드 ──
  // 공통(현행 4종): 온탕/건식/냉탕/한증막. A안은 신규 3종(소금/노천/아이스방)도 여기 합류.
  let tempHtml = ''
  tempHtml += tempItem('온탕', d.temps.hot)
  tempHtml += tempItem('건식', d.temps.dry)
  tempHtml += tempItem('냉탕', d.temps.cold)
  tempHtml += tempItem('한증막', d.temps.bulgama)
  if (layout === 'A') {
    tempHtml += tempItem('소금', d.temps.salt, true)
    tempHtml += tempItem('노천탕', d.temps.openair, true)
    tempHtml += tempItem('아이스방', d.temps.iceroom, true)
  }
  const tempGrid = document.getElementById('tempGrid')
  const count = (tempHtml.match(/class="tm/g) || []).length
  tempGrid.innerHTML = tempHtml || '<p class="empty-hint">온도 기록 없음 → 섹션 자체 미노출</p>'
  // 현행 코드와 동일: 항목 수만큼 1fr — 4개 초과면 4열 고정 + 줄바꿈(A안 핵심 확인 지점)
  tempGrid.style.gridTemplateColumns = `repeat(${Math.min(count || 1, 4)}, 1fr)`
  tempGrid.style.rowGap = count > 4 ? '14px' : '0'

  // ── 트라이브 서브 메트릭 ──
  // 현행: 사우너=습식·급냉·토토노우·재방문 / 목욕=열탕·수질·재방문 / 찜질=땀·휴식·재방문
  // B안: 신규 온도를 성격 맞는 트라이브 컬럼에 — 노천탕→목욕파, 소금·아이스방→찜질파
  const cols = []
  const t = d.tribe
  if (t.saunner) {
    let h = row('습식', t.saunner.steam, '°C') + row('급냉탕', t.saunner.ice, '°C')
    h += row('토토노우', t.saunner.totono, '/5') + row('재방문', t.saunner.revisit, '/5')
    cols.push(['saunner', h])
  }
  if (t.bather) {
    let h = row('열탕', t.bather.veryhot, '°C')
    if (layout === 'B') h += row('노천탕', d.temps.openair, '°C', true)
    h += row('수질', t.bather.water, '/5') + row('재방문', t.bather.revisit, '/5')
    cols.push(['bather', h])
  }
  if (t.jimi) {
    let h = ''
    if (layout === 'B') h += row('소금', d.temps.salt, '°C', true) + row('아이스방', d.temps.iceroom, '°C', true)
    h += row('땀 만족도', t.jimi.sweat, '/5') + row('휴식', t.jimi.rest, '/5') + row('재방문', t.jimi.revisit, '/5')
    cols.push(['jimi', h])
  }
  const tribeGrid = document.getElementById('tribeGrid')
  tribeGrid.innerHTML = cols.map(([id, h]) =>
    `<div class="tribe-col"><p class="t-name" style="color:${TRIBE_META[id].color}">${TRIBE_META[id].name}</p>${h}</div>`
  ).join('') || '<p class="empty-hint">트라이브 기록 없음 → 섹션 미노출</p>'
  tribeGrid.style.gridTemplateColumns = `repeat(${Math.max(cols.length,1)}, 1fr)`

  // 설명
  document.getElementById('layoutNote').innerHTML = layout === 'A'
    ? `<b>A안 — 객관 온도 그리드 합류.</b> 신규 3종(<b style="color:var(--color-primary)">N</b>)을 상단 "객관 온도" 줄에 추가.
       장점: 온도=온도끼리 한눈에, 어드민 포함 객관 데이터 성격 일치. 단점: 풀옵션 장소(①)에서 <b>2줄로 wrap</b> — 카드가 세로로 길어짐.
       시나리오 ②③에서 보듯 데이터 없는 항목은 줄 자체가 짧아져 평소엔 4~5개 수준.`
    : `<b>B안 — 트라이브 서브 메트릭 배치 (유저 제안 방향).</b> 열탕·급냉처럼 신규 온도도 성격 맞는 트라이브 컬럼에: 노천탕→목욕파, 소금·아이스방→찜질파.
       장점: 상단 줄 4개 고정(컴팩트 유지), "내 트라이브 관심사" 묶음 강화. 단점: 객관 온도(어드민 시드 포함)가 주관 점수와 섞임 + 해당 트라이브 기록이 0이면 <b>컬럼 자체가 없어 온도도 같이 숨겨짐</b>(③에서 목욕파 없음 → 노천탕 노출 불가 케이스 확인).`

  document.getElementById('phoneCap').innerHTML =
    `<b>미노출 동작 확인:</b> 이 시나리오에서 값이 null인 항목(예: ${scn==='bath' ? '한증막·소금·노천·아이스방·습식·급냉' : scn==='jjim' ? '온탕·냉탕·노천탕, 목욕파 컬럼 전체' : '없음 — 전부 노출'})은 렌더되지 않음. 실제 코드도 동일(filter ≠ null / 조건부 spread).`
}

document.querySelectorAll('[data-layout]').forEach(b => b.onclick = () => {
  layout = b.dataset.layout
  document.querySelectorAll('[data-layout]').forEach(x => x.classList.toggle('on', x === b))
  render()
})
document.querySelectorAll('[data-scn]').forEach(b => b.onclick = () => {
  scn = b.dataset.scn
  document.querySelectorAll('[data-scn]').forEach(x => x.classList.toggle('on', x === b))
  render()
})
render()
</script>
</body>
</html>
