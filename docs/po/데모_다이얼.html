<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데모 · 회전 다이얼 (온도 입력)</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
:root{--beige:#f4efe6;--beige2:#ece3d3;--beige3:#e2d7c2;--ink:#2b2622;--muted:#8b8175;--line:#ddd2bf;--card:#fffdf8;--saunner:#e8743b;--hot:#e8743b;--cold:#3b82c4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif;color:var(--ink);background:radial-gradient(900px 600px at 88% -5%,rgba(59,130,196,.10),transparent 60%),var(--beige);display:flex;flex-direction:column;align-items:center;padding:34px 16px 70px}
h1{font-family:'Oswald';font-weight:700;font-size:24px;margin:0 0 4px;text-align:center}
.lede{color:var(--muted);font-size:13px;text-align:center;max-width:430px;margin:0 0 18px;line-height:1.7}.lede b{color:var(--ink)}
.material-symbols-rounded{font-size:21px;line-height:1}
.panel{width:360px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 18px 44px -20px rgba(70,50,30,.4);position:relative;overflow:hidden}
.hdr{font-family:'Oswald';font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;margin-bottom:4px}.hdr .material-symbols-rounded{color:var(--saunner)}
.note{font-size:11px;color:var(--muted);margin:0 0 14px}
.pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.pick .ch{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;border:1.5px solid var(--line);background:var(--beige);color:var(--muted);border-radius:999px;padding:7px 12px;cursor:pointer;transition:.15s}
.pick .ch .material-symbols-rounded{font-size:16px}
.pick .ch.on{border-color:var(--saunner);background:rgba(232,116,59,.08);color:var(--saunner)}
.pick .ch.on .seq{font-family:'Oswald';background:var(--saunner);color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.pick-h{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px}

.rows{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:9px;background:var(--beige);border:1px solid var(--line);border-radius:13px;padding:9px 11px}
.row .di{width:34px;height:34px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--saunner);flex:0 0 auto}
.row .nm{flex:1;font-size:12.5px;font-weight:700}.row .nm .seq{font-family:'Oswald';color:var(--saunner);margin-right:6px}
.row .tchip{font-family:'Oswald';font-size:16px;font-weight:700;color:#fff;border-radius:10px;padding:6px 13px;cursor:pointer;border:none}
.row .tchip.hot{background:linear-gradient(135deg,#f0a060,var(--hot))}
.row .tchip.cold{background:linear-gradient(135deg,#7fa9dd,var(--cold))}
.row .tchip.empty{background:var(--beige3);color:var(--muted);font-family:'Noto Sans KR';font-size:11px;cursor:default}
.empty{font-size:12px;color:var(--muted);text-align:center;padding:24px 0;font-style:italic}
.hintbar{margin-top:14px;font-size:10.5px;color:var(--muted);background:var(--beige);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:6px}
.hintbar .material-symbols-rounded{font-size:15px;color:var(--saunner)}

/* popover */
.pop{position:absolute;inset:0;background:rgba(43,38,34,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:10}
.pop.show{display:flex;animation:fade .18s}@keyframes fade{from{opacity:0}to{opacity:1}}
.card{background:var(--card);border-radius:24px;padding:22px;width:250px;text-align:center;box-shadow:0 24px 60px -18px rgba(0,0,0,.5)}
.card .ct{font-size:13.5px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:6px}
.card .ct .material-symbols-rounded{font-size:18px;color:var(--saunner)}
.dial{width:190px;height:190px;margin:0 auto;position:relative;touch-action:none;cursor:grab}.dial:active{cursor:grabbing}
.dial .ring{position:absolute;inset:0;border-radius:50%}
.dial .inner{position:absolute;inset:20px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 10px rgba(0,0,0,.07)}
.dial .num{font-family:'Oswald';font-size:44px;font-weight:700;line-height:1}
.dial .lb{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px}
.dial .handle{position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;border:5px solid var(--saunner);box-shadow:0 2px 7px rgba(0,0,0,.3);top:0;left:0}
.range{font-size:10px;color:var(--muted);margin-top:12px;display:flex;justify-content:space-between;padding:0 6px}
.done{margin-top:14px;border:none;background:var(--saunner);color:#fff;border-radius:13px;padding:12px;width:100%;font-weight:800;font-size:13.5px;cursor:pointer}
.hintd{font-size:10px;color:var(--muted);margin-top:9px}
</style>
</head>
<body>
<h1>회전 다이얼</h1>
<p class="lede">시설의 온도칩을 <b>탭하면 다이얼 팝오버</b>가 떠요. 손가락으로 <b>돌려서</b> 온도 설정(iOS 타이머 감성). 블록을 키우지 않고 <b>팝오버</b>라 자리 안 먹고, 한 번에 한 시설씩 집중.</p>

<div class="panel">
  <div class="hdr"><span class="material-symbols-rounded">donut_large</span> 온도 입력 (시간은 칩 옆 −/+ 가정)</div>
  <p class="note">아래 칩으로 루틴을 구성 → 온도칩 탭 → 돌려서 설정.</p>
  <div class="pick-h">시설 추가/제거</div>
  <div class="pick" id="pick"></div>
  <div class="rows" id="rows"></div>
  <div class="hintbar"><span class="material-symbols-rounded">cached</span> 온도칩 탭 → 다이얼 돌리기 · 색=따뜻(빨강)/차가움(파랑)</div>

  <div class="pop" id="pop"><div class="card">
    <div class="ct"><span class="material-symbols-rounded" id="popIc">local_fire_department</span><span id="popTitle">건식 온도</span></div>
    <div class="dial" id="dial"><div class="ring" id="ring"></div><div class="inner"><span class="num" id="num">90</span><span class="lb">°C</span></div><div class="handle" id="handle"></div></div>
    <div class="range"><span id="rmin">50°</span><span id="rmax">130°</span></div>
    <button class="done" onclick="closeDial()">확정</button>
    <div class="hintd">다이얼을 돌려 맞추고 확정</div>
  </div></div>
</div>

<script>
const COLD=['cold','ice'];
const CATALOG=[
  ['dry','건식','local_fire_department',[50,130,90]],
  ['steam','습식','humidity_high',[40,75,60]],
  ['cold','냉탕','ac_unit',[5,30,15]],
  ['hot','온탕','hot_tub',[35,42,40]],
  ['rest','휴식','self_improvement',null],
];
let seq=[],cur=null;
const $=s=>document.querySelector(s);
const item=t=>CATALOG.find(c=>c[0]===t);
const isCold=t=>COLD.includes(t);

function renderPick(){
  const p=$('#pick');p.innerHTML='';
  CATALOG.forEach(([t,l,ic])=>{
    const idx=seq.findIndex(s=>s.type===t),sel=idx>-1;
    const ch=document.createElement('div');ch.className='ch'+(sel?' on':'');
    ch.innerHTML=(sel?`<span class="seq">${idx+1}</span>`:`<span class="material-symbols-rounded">${ic}</span>`)+l;
    ch.onclick=()=>{if(idx>-1)seq.splice(idx,1);else{const[,,,r]=item(t);seq.push({type:t,label:l,icon:ic,range:r,temp:r?r[2]:null});}renderAll();};
    p.appendChild(ch);
  });
}
function renderRows(){
  const rows=$('#rows');
  if(!seq.length){rows.innerHTML='<div class="empty">위 칩으로 시설을 골라 보세요</div>';return;}
  rows.innerHTML='';
  seq.forEach((s,i)=>{
    const r=document.createElement('div');r.className='row';
    const chip=s.range?`<button class="tchip ${isCold(s.type)?'cold':'hot'}" data-i="${i}">${s.temp}°C</button>`:`<span class="tchip empty">온도 없음</span>`;
    r.innerHTML=`<div class="di"><span class="material-symbols-rounded" style="font-size:19px">${s.icon}</span></div><div class="nm"><span class="seq">${i+1}</span>${s.label}</div>${chip}`;
    rows.appendChild(r);
  });
  rows.querySelectorAll('.tchip[data-i]').forEach(b=>b.onclick=()=>openDial(+b.dataset.i));
}
function renderAll(){renderPick();renderRows();}

/* ── 다이얼 ── */
function openDial(i){cur=i;const s=seq[i];const col=isCold(s.type)?'var(--cold)':'var(--hot)';
  document.documentElement.style.setProperty('--saunner', isCold(s.type)?'#3b82c4':'#e8743b');
  $('#popIc').textContent=s.icon;$('#popTitle').textContent=s.label+' 온도';
  $('#rmin').textContent=s.range[0]+'°';$('#rmax').textContent=s.range[1]+'°';
  $('#pop').classList.add('show');draw();}
function closeDial(){$('#pop').classList.remove('show');document.documentElement.style.setProperty('--saunner','#e8743b');cur=null;renderRows();}
function draw(){
  const s=seq[cur];const[mn,mx]=s.range;const frac=(s.temp-mn)/(mx-mn);
  const col=isCold(s.type)?'#3b82c4':'#e8743b';
  const sweep=frac*270;
  $('#ring').style.background=`conic-gradient(from 225deg, ${col} 0deg ${sweep}deg, var(--beige2) ${sweep}deg 270deg, transparent 270deg 360deg)`;
  $('#num').textContent=s.temp;
  // handle 위치: 225deg(좌하단) 기준 시계방향 sweep
  const deg=225+sweep;const rad=deg*Math.PI/180;const R=84,C=95;
  const hx=C+R*Math.cos(rad),hy=C+R*Math.sin(rad);
  $('#handle').style.left=(hx-11)+'px';$('#handle').style.top=(hy-11)+'px';
}
(function(){
  const dial=$('#dial');let dragging=false;
  const upd=e=>{
    const r=dial.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;
    let deg=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;   // -180..180, 0=오른쪽
    let a=deg-135;if(a<0)a+=360;                                  // 0 = 225deg 지점에서 시작
    if(a>270){a=(a>315)?0:270;}                                   // 하단 갭 클램프
    const s=seq[cur];const[mn,mx]=s.range;s.temp=Math.round(mn+(a/270)*(mx-mn));draw();
  };
  dial.addEventListener('pointerdown',e=>{if(cur==null)return;dragging=true;dial.setPointerCapture(e.pointerId);upd(e);});
  dial.addEventListener('pointermove',e=>{if(dragging)upd(e);});
  dial.addEventListener('pointerup',e=>{dragging=false;try{dial.releasePointerCapture(e.pointerId);}catch(_){}});
  dial.addEventListener('pointercancel',()=>dragging=false);
})();

seq=['dry','cold','rest'].map(t=>{const[,l,ic,r]=item(t);return{type:t,label:l,icon:ic,range:r,temp:r?r[2]:null};});
renderAll();
</script>
</body>
</html>
