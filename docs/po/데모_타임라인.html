<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데모 · 리추얼 타임라인 (온도·시간·순서·반복제외)</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
:root{--beige:#f4efe6;--beige2:#ece3d3;--beige3:#e2d7c2;--ink:#2b2622;--muted:#8b8175;--line:#ddd2bf;--card:#fffdf8;--saunner:#e8743b;--hot:#e8743b;--cold:#3b82c4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif;color:var(--ink);background:radial-gradient(900px 600px at 12% -5%,rgba(232,116,59,.10),transparent 60%),var(--beige);display:flex;flex-direction:column;align-items:center;padding:34px 16px 70px}
h1{font-family:'Oswald';font-weight:700;font-size:24px;margin:0 0 4px;text-align:center}
.lede{color:var(--muted);font-size:13px;text-align:center;max-width:460px;margin:0 0 18px;line-height:1.7}.lede b{color:var(--ink)}
.material-symbols-rounded{font-size:21px;line-height:1}
.panel{width:372px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 18px 44px -20px rgba(70,50,30,.4)}
.hdr{font-family:'Oswald';font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;margin-bottom:4px}.hdr .material-symbols-rounded{color:var(--saunner)}
.note{font-size:11px;color:var(--muted);margin:0 0 14px}
.pick-h{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px}
.pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.pick .ch{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;border:1.5px solid var(--line);background:var(--beige);color:var(--muted);border-radius:999px;padding:7px 12px;cursor:pointer;transition:.15s}
.pick .ch .material-symbols-rounded{font-size:16px}
.pick .ch.on{border-color:var(--saunner);background:rgba(232,116,59,.08);color:var(--saunner)}
.pick .ch.on .seq{font-family:'Oswald';background:var(--saunner);color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}

/* timeline */
.tl{position:relative;padding-left:2px}
.stop{display:flex;align-items:center;gap:10px;padding:6px 0;position:relative;transition:opacity .15s}
.stop:not(:last-child)::before{content:"";position:absolute;left:13px;top:50%;bottom:-6px;width:0;border-left:2.5px solid var(--line);z-index:0}
.stop.nolink:not(:last-child)::before{border-left-style:dashed;border-color:var(--beige3)}
.stop.dragging{opacity:.45}
.stop.excl{opacity:.62}
.stop.dropabove{box-shadow:inset 0 3px 0 var(--saunner);border-radius:4px}
.stop.dropbelow{box-shadow:inset 0 -3px 0 var(--saunner);border-radius:4px}
.dot{width:26px;height:26px;border-radius:50%;border:3px solid var(--card);box-shadow:0 0 0 1.5px var(--line);position:relative;z-index:1;flex:0 0 auto;cursor:grab;display:flex;align-items:center;justify-content:center;color:#fff;touch-action:none}
.dot:active{cursor:grabbing}
.dot .material-symbols-rounded{font-size:14px;opacity:0}
.dot.excl{background:var(--card)!important;box-shadow:0 0 0 1.5px var(--line)}
.dot.excl .material-symbols-rounded{opacity:1;color:var(--muted)}
.tbar{flex:1;height:44px;border-radius:12px;background:var(--beige2);position:relative;overflow:hidden;border:1px solid var(--line);cursor:ew-resize;touch-action:none;min-width:0;user-select:none}
.tbar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:11px 0 0 11px}
.tbar .fill.hot{background:linear-gradient(90deg,#f3b489,var(--hot))}
.tbar .fill.cold{background:linear-gradient(90deg,#bcd3ee,var(--cold))}
.tbar .ct{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 13px;pointer-events:none}
.tbar .nm{font-size:12px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.25);display:flex;align-items:center;gap:5px}
.tbar .nm .one{font-family:'Noto Sans KR';font-size:8.5px;font-weight:700;background:rgba(255,255,255,.35);padding:1px 5px;border-radius:5px}
.tbar .val{font-family:'Oswald';font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.tbar.norange{background:var(--card);cursor:default}.tbar.norange .nm{color:var(--ink);text-shadow:none}.tbar.norange .nm .one{background:var(--beige3);color:var(--muted)}.tbar.norange .val{color:var(--muted);text-shadow:none;font-size:11px}
.time{flex:0 0 auto;display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:5px 6px}
.time button{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--beige);font-size:15px;line-height:1;cursor:pointer;color:var(--ink)}.time button:active{background:var(--beige3)}
.time b{font-family:'Oswald';font-size:15px;min-width:20px;text-align:center}.time .u{font-size:9px;color:var(--muted)}
.reps{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:700;margin-top:16px}
.reps .stp{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px 11px}
.reps .stp button{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--beige);font-size:15px;cursor:pointer}.reps .stp b{font-family:'Oswald';font-size:16px}
.empty{font-size:12px;color:var(--muted);text-align:center;padding:24px 0;font-style:italic}
.hintbar{margin-top:14px;font-size:10.5px;color:var(--muted);background:var(--beige);border-radius:9px;padding:10px 11px;display:flex;flex-direction:column;gap:5px}
.hintbar .r{display:flex;align-items:center;gap:6px}.hintbar .material-symbols-rounded{font-size:15px;color:var(--saunner)}
</style>
</head>
<body>
<h1>리추얼 타임라인</h1>
<p class="lede">온도바 <b>좌우 드래그=온도</b> · 오른쪽 <b>−/+=시간</b> · 왼쪽 점 <b>위아래 드래그=순서 변경</b> · 왼쪽 점 <b>탭=반복 제외</b>(링크 끊겨 1회만). 따뜻=빨강 / 차가움=파랑 열지도.</p>

<div class="panel">
  <div class="hdr"><span class="material-symbols-rounded">timeline</span> 온도·시간·순서·반복</div>
  <p class="note">칩으로 루틴 구성 → 점을 끌어 순서·탭으로 반복 제외.</p>
  <div class="pick-h">시설 추가/제거</div>
  <div class="pick" id="pick"></div>
  <div class="tl" id="tl"></div>
  <div class="reps" id="reps" style="display:none"><span>반복 구간</span><div class="stp"><button onclick="bumpRep(-1)">−</button><b id="repB">3</b><button onclick="bumpRep(1)">+</button></div><span>세트 <span style="opacity:.7">(제외 단계는 1회)</span></span></div>
  <div class="hintbar">
    <div class="r"><span class="material-symbols-rounded">drag_indicator</span> 왼쪽 점을 <b>위아래로 끌면</b> 순서가 바뀝니다</div>
    <div class="r"><span class="material-symbols-rounded">link_off</span> 왼쪽 점을 <b>탭하면</b> 반복에서 제외 — 링크가 끊기고 <b>1회</b> 표시</div>
  </div>
</div>

<script>
const COLD=['cold','ice'];
const CATALOG=[
  ['dry','건식','local_fire_department',[50,130,90],12],
  ['steam','습식','humidity_high',[40,75,60],10],
  ['cold','냉탕','ac_unit',[5,30,15],1],
  ['hot','온탕','hot_tub',[35,42,40],8],
  ['scrub','세신','spa',null,20],
  ['rest','휴식','self_improvement',null,5],
];
let seq=[],repeat=3,dragFrom=null;
const $=s=>document.querySelector(s);
const item=t=>CATALOG.find(c=>c[0]===t);
const isCold=t=>COLD.includes(t);

function renderPick(){
  const p=$('#pick');p.innerHTML='';
  CATALOG.forEach(([t,l,ic])=>{
    const idx=seq.findIndex(s=>s.type===t),sel=idx>-1;
    const ch=document.createElement('div');ch.className='ch'+(sel?' on':'');
    ch.innerHTML=(sel?`<span class="seq">${idx+1}</span>`:`<span class="material-symbols-rounded">${ic}</span>`)+l;
    ch.onclick=()=>{if(idx>-1)seq.splice(idx,1);else{const[,,,r,d]=item(t);seq.push({type:t,label:l,range:r,temp:r?r[2]:null,dur:d,norepeat:false});}renderAll();};
    p.appendChild(ch);
  });
}
function clearDrop(){$('#tl').querySelectorAll('.stop').forEach(s=>s.classList.remove('dropabove','dropbelow'));}
function move(from,to){if(from==null)return;const it=seq.splice(from,1)[0];if(to>from)to--;to=Math.max(0,Math.min(seq.length,to));seq.splice(to,0,it);renderAll();}

function renderTL(){
  const tl=$('#tl');
  if(!seq.length){tl.innerHTML='<div class="empty">위 칩으로 시설을 골라 보세요</div>';$('#reps').style.display='none';return;}
  $('#reps').style.display='flex';$('#repB').textContent=repeat;
  tl.innerHTML='';
  seq.forEach((s,i)=>{
    const has=!!s.range, excl=s.norepeat;
    const nolink = excl || (seq[i+1] && seq[i+1].norepeat);
    const dotc=excl?'var(--card)':(!has?'var(--beige3)':(isCold(s.type)?'var(--cold)':'var(--hot)'));
    const stop=document.createElement('div');stop.className='stop'+(nolink?' nolink':'')+(excl?' excl':'');
    const one = excl?'<span class="one">1회</span>':'';
    const dot=`<span class="dot${excl?' excl':''}" data-i="${i}" draggable="true" style="background:${dotc}" title="탭=반복제외 / 드래그=순서"><span class="material-symbols-rounded">link_off</span></span>`;
    let bar;
    if(has){const[mn,mx]=s.range;const pct=Math.round((s.temp-mn)/(mx-mn)*100);
      bar=`<div class="tbar" data-i="${i}"><div class="fill ${isCold(s.type)?'cold':'hot'}" style="width:${pct}%"></div><div class="ct"><span class="nm">${i+1} ${s.label}${one}</span><span class="val">${s.temp}°C</span></div></div>`;}
    else bar=`<div class="tbar norange"><div class="ct"><span class="nm">${i+1} ${s.label}${one}</span><span class="val">온도 없음</span></div></div>`;
    const time=`<div class="time"><button data-act="d" data-i="${i}">−</button><b>${s.dur}</b><span class="u">분</span><button data-act="u" data-i="${i}">+</button></div>`;
    stop.innerHTML=dot+bar+time;
    tl.appendChild(stop);
  });

  // 시간 스텝퍼
  tl.querySelectorAll('.time button').forEach(b=>{const i=+b.dataset.i;b.onclick=()=>{seq[i].dur=Math.max(0,seq[i].dur+(b.dataset.act==='u'?1:-1));renderTL();};});

  // 온도 드래그 (in-place)
  tl.querySelectorAll('.tbar[data-i]').forEach(bar=>{
    const i=+bar.dataset.i;const s=seq[i];const[mn,mx]=s.range;
    const fill=bar.querySelector('.fill'),val=bar.querySelector('.val');
    const apply=x=>{const r=bar.getBoundingClientRect();let p=Math.max(0,Math.min(1,(x-r.left)/r.width));s.temp=Math.round(mn+p*(mx-mn));fill.style.width=Math.round((s.temp-mn)/(mx-mn)*100)+'%';val.textContent=s.temp+'°C';};
    let dr=false;
    bar.addEventListener('pointerdown',e=>{dr=true;bar.setPointerCapture(e.pointerId);apply(e.clientX);});
    bar.addEventListener('pointermove',e=>{if(dr)apply(e.clientX);});
    bar.addEventListener('pointerup',e=>{dr=false;try{bar.releasePointerCapture(e.pointerId);}catch(_){}});
    bar.addEventListener('pointercancel',()=>dr=false);
  });

  // 왼쪽 점: 탭=반복제외 / 네이티브 드래그=순서변경
  tl.querySelectorAll('.dot[data-i]').forEach(dot=>{
    const i=+dot.dataset.i;const stop=dot.closest('.stop');
    dot.addEventListener('click',()=>{seq[i].norepeat=!seq[i].norepeat;renderTL();});
    dot.addEventListener('dragstart',e=>{dragFrom=i;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','x');setTimeout(()=>stop.classList.add('dragging'),0);});
    dot.addEventListener('dragend',()=>{stop.classList.remove('dragging');clearDrop();dragFrom=null;});
  });
  // 각 stop이 드롭 타겟
  tl.querySelectorAll('.stop').forEach((stop,idx)=>{
    stop.addEventListener('dragover',e=>{e.preventDefault();const r=stop.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;clearDrop();stop.classList.add(after?'dropbelow':'dropabove');});
    stop.addEventListener('drop',e=>{e.preventDefault();const r=stop.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;clearDrop();move(dragFrom, idx+(after?1:0));});
  });
}
function bumpRep(d){repeat=Math.max(1,repeat+d);$('#repB').textContent=repeat;}
function renderAll(){renderPick();renderTL();}

seq=['dry','cold','rest'].map(t=>{const[,l,,r,d]=item(t);return{type:t,label:l,range:r,temp:r?r[2]:null,dur:d,norepeat:false};});
renderAll();
</script>
</body>
</html>
